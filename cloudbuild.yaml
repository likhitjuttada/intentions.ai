steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"
      - "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ui-navigator-backend
      - "--image=gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--max-instances=10"
      - "--set-env-vars=GOOGLE_API_KEY=$$GOOGLE_API_KEY"
    secretEnv:
      - GOOGLE_API_KEY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/google-api-key/versions/latest
      env: GOOGLE_API_KEY

images:
  - "gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"
