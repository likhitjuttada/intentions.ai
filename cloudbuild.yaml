steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"
      - "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ui-navigator-backend
      - "--image=gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--max-instances=10"
      - "--remove-env-vars=GOOGLE_API_KEY"
      - "--update-secrets=GOOGLE_API_KEY=google-api-key:latest"

images:
  - "gcr.io/$PROJECT_ID/ui-navigator-backend:$COMMIT_SHA"
